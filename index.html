<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高知工業漕艇部</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .landing {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 60px;
            background: var(--bg-dark);
            position: relative;
            overflow: hidden;
        }

        .landing::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(0, 229, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 50%, rgba(255, 107, 157, 0.05) 0%, transparent 50%);
            animation: landingGlow 8s ease-in-out infinite alternate;
        }

        @keyframes landingGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(10deg); }
        }

        .landing-logo {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .landing-logo img {
            width: 100px;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        .landing-logo h1 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #fff;
        }

        .landing-logo p {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 8px;
            letter-spacing: 0.3em;
        }

        .landing-choices {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .landing-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 260px;
            height: 320px;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-decoration: none;
            color: #fff;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        .landing-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .landing-card.boys::before {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.1) 0%, transparent 60%);
        }

        .landing-card.girls::before {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.1) 0%, transparent 60%);
        }

        .landing-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .landing-card:hover::before {
            opacity: 1;
        }

        .landing-card .card-label {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .landing-card.boys .card-label {
            background: linear-gradient(to bottom, #fff, var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .landing-card.girls .card-label {
            background: linear-gradient(to bottom, #fff, #ff6b9d);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .landing-card .card-sub {
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 10px;
            letter-spacing: 0.2em;
            position: relative;
            z-index: 1;
        }

        .landing-card .card-arrow {
            margin-top: 30px;
            font-size: 1.5rem;
            color: var(--text-muted);
            transition: transform 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .landing-card:hover .card-arrow {
            transform: translateX(8px);
        }

        @media (max-width: 600px) {
            .landing-choices {
                gap: 20px;
            }

            .landing-card {
                width: 160px;
                height: 220px;
            }

            .landing-card .card-label {
                font-size: 2.5rem;
            }

            .landing-card .card-arrow {
                margin-top: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="landing">
        <div class="landing-logo">
            <img src="kasuityou/kasuityou.gif" alt="高知工業校章">
            <h1>Kochi Kogyo Rowing</h1>
            <p>高知工業漕艇部</p>
        </div>
        <div class="landing-choices">
            <a href="boys/" class="landing-card boys">
                <div class="card-label">Boys</div>
                <div class="card-sub">男子</div>
                <div class="card-arrow">→</div>
            </a>
            <a href="girls/" class="landing-card girls">
                <div class="card-label">Girls</div>
                <div class="card-sub">女子</div>
                <div class="card-arrow">→</div>
            </a>
        </div>
    </div>
</body>

</html>
